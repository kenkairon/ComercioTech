# ==========================================================
# Archivo de configuración de MongoDB
# Proyecto: ComercioTech
# MongoDB 7.x
# ==========================================================

# ----------------------------------------------------------
# Almacenamiento
# ----------------------------------------------------------
storage:

  # Ruta donde MongoDB almacena la base de datos
  dbPath: /data/db

  # Motor de almacenamiento
  engine: wiredTiger

  wiredTiger:
    engineConfig:

      # Tamaño máximo de la caché (GB)
      cacheSizeGB: 1

# ----------------------------------------------------------
# Sistema de logs
# ----------------------------------------------------------
systemLog:

  destination: file

  logAppend: true

  path: /var/log/mongodb/mongod.log

  verbosity: 0

# ----------------------------------------------------------
# Red
# ----------------------------------------------------------
net:

  port: 27017

  bindIp: 0.0.0.0

  ipv6: false

# ----------------------------------------------------------
# Seguridad
# ----------------------------------------------------------
security:

  authorization: enabled

# ----------------------------------------------------------
# Gestión del proceso
# ----------------------------------------------------------
processManagement:

  fork: false

  timeZoneInfo: /usr/share/zoneinfo

# ----------------------------------------------------------
# Operaciones
# ----------------------------------------------------------
operationProfiling:

  mode: slowOp

  slowOpThresholdMs: 100

# ----------------------------------------------------------
# Parámetros adicionales
# ----------------------------------------------------------
setParameter:

  enableLocalhostAuthBypass: false